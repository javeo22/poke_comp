<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#111110"/>
  <!-- Pokeball outer circle -->
  <circle cx="16" cy="16" r="12" stroke="#CC2929" stroke-width="1.8"/>
  <!-- Horizontal divider -->
  <line x1="4" y1="16" x2="12.5" y2="16" stroke="#CC2929" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="19.5" y1="16" x2="28" y2="16" stroke="#CC2929" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Center button -->
  <circle cx="16" cy="16" r="3.5" stroke="#CC2929" stroke-width="1.8"/>
  <!-- 45-degree targeting lines -->
  <line x1="7.51" y1="7.51" x2="13.52" y2="13.52" stroke="#CC2929" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="18.48" y1="13.52" x2="24.49" y2="7.51" stroke="#CC2929" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="13.52" y1="18.48" x2="7.51" y2="24.49" stroke="#CC2929" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="18.48" y1="18.48" x2="24.49" y2="24.49" stroke="#CC2929" stroke-width="1.4" stroke-linecap="round"/>
</svg>
