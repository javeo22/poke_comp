name: Deploy

on:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.14

      - name: Install API dependencies
        run: cd api && uv sync --frozen

      - name: Lint API
        run: cd api && uv run ruff check app/ scripts/

      - name: Type check API
        run: cd api && uv run pyright app/ scripts/

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Lint web
        run: cd web && pnpm lint

      - name: Build web
        run: cd web && pnpm build

  deploy-api:
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        run: |
          gcloud builds submit \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/poke-comp-api \
            --dockerfile infra/Dockerfile.api \
            .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy poke-comp-api \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/poke-comp-api \
            --region us-east1 \
            --platform managed \
            --allow-unauthenticated
