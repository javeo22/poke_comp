name: Weekly Data Ingestion

on:
  schedule:
    # Run at 02:00 AM UTC every Sunday
    - cron: '0 2 * * 0'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Install dependencies
      working-directory: ./api
      run: uv sync

    - name: Run Smogon Meta Ingestion
      working-directory: ./api
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: uv run python -m scripts.ingest.smogon_meta

    - name: Run Limitless Teams Ingestion
      working-directory: ./api
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: uv run python -m scripts.ingest.limitless_teams
